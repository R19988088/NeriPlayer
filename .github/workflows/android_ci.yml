name: NeriPlayer Android CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gradle-tests:
    name: Gradle tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --warning-mode all --stacktrace

      - name: Run lint
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:lintDebug --warning-mode all --stacktrace

      - name: Upload Gradle test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
            **/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  android-instrumented-tests:
    name: Android instrumented tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo sh -c 'echo "KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\", OPTIONS+=\"static_node=kvm\"" > /etc/udev/rules.d/99-kvm4all.rules'
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --warning-mode all --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-instrumented-test-reports
          path: |
            **/build/reports/androidTests/connected/**
            **/build/outputs/androidTest-results/connected/**
          if-no-files-found: ignore

  worker-check:
    name: Worker check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: np-submodule/NeriPlayer-LTW/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --prefix np-submodule/NeriPlayer-LTW

      - name: Run Worker check
        run: npm run check --prefix np-submodule/NeriPlayer-LTW

  build:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]')) && (github.ref == 'refs/heads/master' || github.event_name == 'pull_request') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          mkdir -p app
          echo "$KEYSTORE_B64" | base64 -d > app/neri.jks
          test -s app/neri.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare build metadata
        id: meta
        run: |
          echo "release_time=$(TZ=Asia/Taipei date +'%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build unsigned Debug for PR
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleDebug -PbuildVersionTimestamp=${{ steps.meta.outputs.release_time }} --warning-mode all --stacktrace

      - name: Build signed APK for master
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          ./gradlew :app:assembleRelease \
            -PbuildVersionTimestamp=${{ steps.meta.outputs.release_time }} \
            -PKEYSTORE_FILE=neri.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=key0 \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            -PREQUIRE_RELEASE_KEYSTORE=true \
            --warning-mode all --stacktrace

      - name: Find APK
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        id: find_apk
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/release -name 'NeriPlayer-*.apk' -type f | sort | tail -n 1)
          test -n "$apk"
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$apk")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.find_apk.outputs.apk_name }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
