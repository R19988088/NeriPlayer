name: NeriPlayer Android CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gradle-tests:
    name: Gradle tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --warning-mode all --stacktrace

      - name: Run lint
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:lintDebug --warning-mode all --stacktrace

      - name: Upload Gradle test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
            **/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  android-instrumented-tests:
    name: Android instrumented tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo sh -c 'echo "KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\", OPTIONS+=\"static_node=kvm\"" > /etc/udev/rules.d/99-kvm4all.rules'
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --warning-mode all --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-instrumented-test-reports
          path: |
            **/build/reports/androidTests/connected/**
            **/build/outputs/androidTest-results/connected/**
          if-no-files-found: ignore

  worker-check:
    name: Worker check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: np-submodule/NeriPlayer-LTW/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --prefix np-submodule/NeriPlayer-LTW

      - name: Run Worker check
        run: npm run check --prefix np-submodule/NeriPlayer-LTW

  build:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]')) && (github.ref == 'refs/heads/master' || github.event_name == 'pull_request') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          mkdir -p app
          echo "$KEYSTORE_B64" | base64 -d > app/neri.jks
          test -s app/neri.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare build metadata
        id: meta
        run: |
          echo "release_time=$(TZ=Asia/Taipei date +'%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build unsigned Debug for PR
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleDebug -PbuildVersionTimestamp=${{ steps.meta.outputs.release_time }} --warning-mode all --stacktrace

      - name: Build signed Debug for master
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          ./gradlew :app:assembleDebug \
            -PbuildVersionTimestamp=${{ steps.meta.outputs.release_time }} \
            -PKEYSTORE_FILE=neri.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=key0 \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            -PREQUIRE_RELEASE_KEYSTORE=true \
            --warning-mode all --stacktrace

      - name: Find Debug APK
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        id: find_apk
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/debug -name 'NeriPlayer-*.apk' -type f | sort | tail -n 1)
          test -n "$apk"
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$apk")" >> "$GITHUB_OUTPUT"

      - name: Upload Debug APK to release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
        run: |
          set -euo pipefail
          gh release view debug-apk >/dev/null 2>&1 || \
            gh release create debug-apk --title "Debug APK" --notes "Latest debug APK" --prerelease
          gh release upload debug-apk "$APK_PATH" --clobber

      - name: Send APK via Telegram API
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          BOT_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          APK_PATH:    ${{ steps.find_apk.outputs.apk_path }}
          SHA:         ${{ github.sha }}
          COMMIT_MSG:  ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO:        ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Sending $APK_PATH"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="$(git log -1 --pretty=%s)"
          fi
          if [ -z "$COMMIT_AUTHOR" ]; then
            COMMIT_AUTHOR="$(git log -1 --pretty=%an)"
          fi
          
          safe_commit_msg=$(echo "$COMMIT_MSG" | sed 's/&/&amp;/g; s/</&lt;/g; s/>/&gt;/g')
          
          commit_author="$COMMIT_AUTHOR"
          commit_url="https://github.com/${REPO}/commit/${SHA}"
          
          caption=" <b>检测到新的 GitHub 推送！</b>
          <b>Commit SHA:</b> <code>${SHA}</code>
          
          <pre>${safe_commit_msg}</pre>
          
          <b>提交者:</b> <code>${commit_author}</code>
          <a href=\"${commit_url}\">查看详情</a>"
          
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram secrets are missing; skip sending APK."
            exit 0
          fi

          response=$(curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document=@"${APK_PATH}" \
            -F caption="${caption}" \
            -F parse_mode=HTML)
          echo "$response"
          echo "$response" | grep -q '"ok":true'
